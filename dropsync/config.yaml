name: DropSync
slug: dropsync
description: Peer-to-peer file transfer app for Home Assistant Supervisor
version: "1.2.0"
url: https://wiki.serversatho.me/en/dropsync
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false

homeassistant_api: false
host_network: false

ports:
  3333/tcp: 3333
ports_description:
  3333/tcp: DropSync direct access port

options:
  port: 3333
  node_env: production
schema:
  port: port
  node_env: list(production|development)
